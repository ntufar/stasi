# Builds a signed Android App Bundle for Play Console.
#
# On push of tags v*:
#   - Validates tag matches app/build.gradle.kts versionName
#   - Builds signed AAB + APK, creates GitHub Release
#   - Uploads AAB to Google Play (track chosen from semver vs previous tag):
#       patch-only (0.0.4 → 0.0.5) → beta
#       minor/major (0.0.4 → 0.1.0) → production
#
# workflow_dispatch: build artifacts; optional manual Play upload (pick track).
#
# Required repo secrets:
#   RELEASE_KEYSTORE_BASE64, KEYSTORE_STORE_PASSWORD, KEYSTORE_KEY_ALIAS, KEYSTORE_KEY_PASSWORD
#   PLAY_SERVICE_ACCOUNT_JSON (required for tag-push Play upload)
#
# Play Console: package io.github.ntufar.stasi; invite service account under Users and permissions.

name: Release (Play bundle)

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track (manual publish only)"
        required: true
        default: beta
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      publish:
        description: "Upload AAB to Play Console"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"

permissions:
  contents: write
  actions: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8"
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make scripts and Gradle wrapper executable
        run: |
          chmod +x ./gradlew
          chmod +x ./.github/scripts/*.sh

      - name: Validate versionName matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: ./.github/scripts/validate-release-version.sh "${{ github.ref_name }}"

      - name: Resolve Play track from tag
        id: play_track
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: ./.github/scripts/resolve-play-track.sh "${{ github.ref_name }}"

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest --stacktrace --warning-mode all

      - name: Decode release keystore and write keystore.properties
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing secret RELEASE_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"
          {
            echo "storeFile=release.keystore"
            echo "storePassword=${KEYSTORE_STORE_PASSWORD}"
            echo "keyAlias=${KEYSTORE_KEY_ALIAS}"
            echo "keyPassword=${KEYSTORE_KEY_PASSWORD}"
          } > "${{ github.workspace }}/keystore.properties"

      - name: Build release bundle and APK
        run: ./gradlew --no-daemon bundleRelease assembleRelease --stacktrace --warning-mode all

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: stasi-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stasi-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Prepare GitHub Release (notes + named APK)
        id: github_release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
          BEGIN { hdr = "^## \\[" ver "\\]" }
          $0 ~ hdr { p=1; next }
          p && $0 ~ /^## \[/ { exit }
          p { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            printf 'No changelog section for `%s`. See CHANGELOG.md on this tag.\n' "$VERSION" > release_notes.md
          fi
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "${{ github.workspace }}/stasi-${VERSION}.apk"
          echo "apk=stasi-${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.github_release.outputs.apk }}
          body_path: release_notes.md

      - name: Ensure Play credentials for tag release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_JSON" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON is required for automatic Play upload on tag push."
            exit 1
          fi

      - name: Prepare Play whatsnew from CHANGELOG
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -E '^\s*versionName\s*=' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          ./.github/scripts/prepare-whatsnew.sh "$VERSION"

      - name: Upload to Google Play
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: io.github.ntufar.stasi
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || steps.play_track.outputs.track }}
          releaseName: ${{ github.event_name == 'push' && github.ref_name || format('manual-{0}', github.run_id) }}
          status: completed
          whatsNewDirectory: distribution/whatsnew
          mappingFile: app/build/outputs/mapping/release/mapping.txt
