# Builds a signed Android App Bundle for Play Console and, on tag push (v*),
# creates a GitHub Release with the release APK attached (notes from CHANGELOG.md).
#
# Required repo secrets for a signed bundle:
#   RELEASE_KEYSTORE_BASE64 — base64 of your upload keystore file
#   KEYSTORE_STORE_PASSWORD
#   KEYSTORE_KEY_ALIAS
#   KEYSTORE_KEY_PASSWORD
#
# Optional — upload to Play (workflow_dispatch with publish=true):
#   PLAY_SERVICE_ACCOUNT_JSON — full JSON of a Play Developer API service account key
#
# One-time Play Console: create app with package name io.github.ntufar.stasi (or change
# applicationId in app/build.gradle.kts first — changing later requires a new listing).

name: Release (Play bundle)

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track (if publishing)"
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      publish:
        description: "Upload AAB to Play Console (needs PLAY_SERVICE_ACCOUNT_JSON)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8"
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore and write keystore.properties
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing secret RELEASE_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"
          {
            echo "storeFile=release.keystore"
            echo "storePassword=${KEYSTORE_STORE_PASSWORD}"
            echo "keyAlias=${KEYSTORE_KEY_ALIAS}"
            echo "keyPassword=${KEYSTORE_KEY_PASSWORD}"
          } > "${{ github.workspace }}/keystore.properties"

      - name: Build release bundle and APK
        run: ./gradlew --no-daemon bundleRelease assembleRelease --stacktrace --warning-mode all

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: stasi-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stasi-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Prepare GitHub Release (notes + named APK)
        id: github_release
        if: github.event_name == 'push'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
          BEGIN { hdr = "^## \\[" ver "\\]" }
          $0 ~ hdr { p=1; next }
          p && $0 ~ /^## \[/ { exit }
          p { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            printf 'No changelog section for `%s`. See CHANGELOG.md on this tag.\n' "$VERSION" > release_notes.md
          fi
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "${{ github.workspace }}/stasi-${VERSION}.apk"
          echo "apk=stasi-${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.github_release.outputs.apk }}
          body_path: release_notes.md

      - name: Upload to Google Play
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: io.github.ntufar.stasi
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
