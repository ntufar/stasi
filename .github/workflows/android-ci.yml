# Builds lint + tests + a debug APK on every push. Download the APK from the run summary:
#   GitHub → Actions → select the latest "Android CI" run → Artifacts → stasi-debug-apk (zip).
#
# The debug APK is arm64-v8a-only (-PstasiAbiArm64Only): MapLibre ships large native libs per ABI;
# a universal debug APK is often ~60MB+, while this artifact fits typical phones and CI storage.
name: Android CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  # Standalone job so the APK is still produced when lint/tests fail (compile-only gate).
  debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8"
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug -PstasiAbiArm64Only --stacktrace --warning-mode all

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stasi-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8"
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew --no-daemon clean --stacktrace

      - name: Lint
        run: ./gradlew --no-daemon lintDebug --stacktrace --warning-mode all

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest --stacktrace --warning-mode all

      - name: Upload lint and test reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stasi-ci-reports
          path: |
            app/build/reports/lint-results-debug.*
            app/build/reports/lint-results-debug/**
            app/build/reports/tests/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-failure-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
